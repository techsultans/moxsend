  <text x="132" y="64" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19" font-weight="800" letter-spacing="4" fill="#EEF2FF">MOX<tspan fill="#38BDF8">SEND</tspan></text>
  <text x="132" y="81" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="9" font-weight="400" letter-spacing="1.5" fill="#38BDF8" opacity="0.38">moxsend.ai</text>
  <rect x="60" y="118" width="580" height="0.8" fill="#38BDF8" opacity="0.12"/>

  <!-- Coming soon specific copy -->
  <text x="60" y="162" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#38BDF8" opacity="0.60">SOMETHING BIG IS COMING</text>

  <text x="60" y="252" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="74" font-weight="900" letter-spacing="-2" fill="#EEF2FF">Cold email,</text>
  <text x="60" y="340" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="74" font-weight="900" letter-spacing="-2" fill="#38BDF8">finally evolved.</text>

  <rect x="60" y="362" width="72" height="2" fill="#38BDF8"/>

  <text x="60" y="402" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="17" font-weight="400" fill="#EEF2FF" opacity="0.42">The AI outreach platform for founders and closers.</text>
  <text x="60" y="428" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="17" font-weight="400" fill="#EEF2FF" opacity="0.42">Launching soon.</text>

  <!-- Waitlist pill -->
  <rect x="60" y="470" width="280" height="42" rx="21" fill="#38BDF8"/>
  <text x="200" y="496" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#060D1F">Join the waitlist →</text>

  <rect x="356" y="470" width="200" height="42" rx="21" fill="rgba(56,189,248,0.08)" stroke="#38BDF8" stroke-width="0.8"/>
