  <text x="60" y="607" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#EEF2FF">Stop spraying. <tspan fill="#38BDF8">Start converting.</tspan></text>
  <text x="1140" y="607" text-anchor="end" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" font-weight="400" letter-spacing="1" fill="#38BDF8" opacity="0.30">moxsend.ai</text>
