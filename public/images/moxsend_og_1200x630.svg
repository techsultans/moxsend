<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="g" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#38BDF8" stroke-width="0.4" opacity="0.07"/>
    </pattern>
    <linearGradient id="hl1" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hl2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="#060D1F"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect x="40" y="40" width="1120" height="550" fill="#090F20" opacity="0.55"/>

  <!-- Brand bars -->
  <rect x="0" y="0" width="1200" height="4" fill="#38BDF8"/>
  <rect x="0" y="0" width="4" height="630" fill="#38BDF8"/>
  <rect x="0" y="626" width="1200" height="4" fill="#38BDF8" opacity="0.25"/>

  <!-- Ghost mark centred at x=950, y=315 — scaled to r=260 -->
  <g transform="translate(950,315)">
    <circle cx="0" cy="0" r="260" fill="none" stroke="#38BDF8" stroke-width="7" opacity="0.09"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#38BDF8" stroke-width="4" opacity="0.06"/>
    <circle cx="0" cy="0" r="135" fill="none" stroke="#38BDF8" stroke-width="3" opacity="0.05"/>
    <circle cx="0" cy="0" r="68"  fill="none" stroke="#38BDF8" stroke-width="2" opacity="0.04"/>
    <!-- Arc M14,58 Q44,8 74,58 scaled s=260/38=6.842 offset -44*s -->
    <!-- (-30*s, 14*s) Q (0, -36*s) (30*s, 14*s) -->
    <path d="M -205,96 Q 0,-246 205,96"
      fill="none" stroke="#38BDF8" stroke-width="46" stroke-linecap="round" opacity="0.15"/>
    <!-- Arrow (16*s,-10*s) (32*s,0) (16*s,10*s) (21*s,0) -->
    <polygon points="109,-68 219,0 109,68 144,0" fill="#38BDF8" opacity="0.18"/>
    <!-- Dot (0, 16*s) -->
    <circle cx="0" cy="110" r="35" fill="#38BDF8" opacity="0.17"/>
  </g>

  <!-- Horizontal accent lines -->
  <rect x="680" y="175" width="480" height="1" fill="url(#hl1)"/>
  <rect x="680" y="350" width="480" height="1" fill="url(#hl2)"/>
  <rect x="680" y="480" width="480" height="1" fill="url(#hl2)"/>

  <!-- LOGO MARK top-left — centred at (90,72) r=30 scaled s=30/38=0.789 -->
  <g transform="translate(90,72)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#38BDF8" stroke-width="2.5"/>
    <path d="M -22,11 Q 0,-26 22,11" fill="none" stroke="#38BDF8" stroke-width="5.2" stroke-linecap="round"/>
    <polygon points="11,-8 21,0 11,8 14,0" fill="#FFFFFF"/>
    <circle cx="0" cy="12" r="4" fill="#38BDF8"/>
  </g>

  <!-- Wordmark -->
  <text x="132" y="64"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="19" font-weight="800" letter-spacing="4" fill="#EEF2FF">MOX<tspan fill="#38BDF8">SEND</tspan></text>
  <text x="132" y="81"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="9" font-weight="400" letter-spacing="1.5" fill="#38BDF8" opacity="0.38">moxsend.ai</text>

  <!-- Divider -->
  <rect x="60" y="118" width="580" height="0.8" fill="#38BDF8" opacity="0.12"/>

  <!-- Eyebrow -->
  <text x="60" y="162"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="4" fill="#38BDF8" opacity="0.60">THE AI COLD EMAIL PLATFORM</text>

  <!-- Main headline -->
  <text x="60" y="248"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="72" font-weight="900" letter-spacing="-2" fill="#EEF2FF">Stop spraying.</text>
  <text x="60" y="334"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="72" font-weight="900" letter-spacing="-2" fill="#38BDF8">Start converting.</text>

  <!-- Rule -->
  <rect x="60" y="358" width="72" height="2" fill="#38BDF8"/>

  <!-- Sub copy -->
  <text x="60" y="398"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="17" font-weight="400" fill="#EEF2FF" opacity="0.42">AI-powered cold email built for businesses with moxie.</text>
  <text x="60" y="424"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="17" font-weight="400" fill="#EEF2FF" opacity="0.42">Precision outreach that converts — not blasts that annoy.</text>

  <!-- CTA row -->
  <rect x="60" y="466" width="240" height="40" rx="20"
    fill="#060D1F" stroke="#38BDF8" stroke-width="1.2"/>
  <circle cx="84" cy="486" r="5" fill="#38BDF8"/>
  <text x="100" y="491"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="500" fill="#38BDF8">hello@moxsend.ai</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#070E22"/>
  <rect x="0" y="570" width="1200" height="1" fill="#38BDF8" opacity="0.10"/>
  <text x="60" y="607"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="14" font-weight="700" fill="#EEF2FF">Stop spraying. <tspan fill="#38BDF8">Start converting.</tspan></text>
  <text x="1140" y="607" text-anchor="end"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="400" letter-spacing="1" fill="#38BDF8" opacity="0.30">moxsend.ai</text>
</svg>
