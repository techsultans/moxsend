<svg xmlns="http://www.w3.org/2000/svg" width="800" height="860" viewBox="0 0 800 860">

  <rect width="800" height="860" fill="#03050C"/>

  <defs>
    <linearGradient id="arc1d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="arc2d" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#818CF8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="arc3d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4537E" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#D4537E" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D4537E" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="arc4d" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#34D399" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="arc5d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#FBBF24" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="arc6d" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#F472B6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="1.0"/>
    </linearGradient>
    <radialGradient id="coreGlowd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#818CF8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlowd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordGradd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="60%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="400" cy="300" rx="260" ry="260" fill="url(#outerGlowd)"/>
  <ellipse cx="400" cy="300" rx="80"  ry="80"  fill="url(#coreGlowd)"/>

  <!-- SIX PRIMARY ARCS -->
  <path d="M 150,80  C 190,140 260,200 400,300" fill="none" stroke="url(#arc1d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="150" cy="80"  r="2.5" fill="#38BDF8" opacity="0.35"/>

  <path d="M 650,80  C 610,140 540,200 400,300" fill="none" stroke="url(#arc2d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="650" cy="80"  r="2.5" fill="#818CF8" opacity="0.35"/>

  <path d="M 108,280 C 180,270 280,275 400,300" fill="none" stroke="url(#arc3d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="108" cy="280" r="2.5" fill="#D4537E" opacity="0.35"/>

  <path d="M 692,280 C 620,270 520,275 400,300" fill="none" stroke="url(#arc4d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="692" cy="280" r="2.5" fill="#34D399" opacity="0.35"/>

  <path d="M 160,520 C 220,450 300,370 400,300" fill="none" stroke="url(#arc5d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="160" cy="520" r="2.5" fill="#FBBF24" opacity="0.35"/>

  <path d="M 640,520 C 580,450 500,370 400,300" fill="none" stroke="url(#arc6d)" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="640" cy="520" r="2.5" fill="#F472B6" opacity="0.35"/>

  <!-- SECONDARY ARCS -->
  <path d="M 400,55  C 400,130 400,210 400,300" fill="none" stroke="#38BDF8" stroke-width="1.0" stroke-linecap="round" opacity="0.25"/>
  <circle cx="400" cy="55"  r="1.8" fill="#38BDF8" opacity="0.30"/>

  <path d="M 400,545 C 400,470 400,390 400,300" fill="none" stroke="#818CF8" stroke-width="1.0" stroke-linecap="round" opacity="0.20"/>
  <circle cx="400" cy="545" r="1.8" fill="#818CF8" opacity="0.28"/>

  <path d="M 250,62  C 290,130 340,200 400,300" fill="none" stroke="#38BDF8" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>
  <path d="M 550,62  C 510,130 460,200 400,300" fill="none" stroke="#818CF8" stroke-width="0.8" stroke-linecap="round" opacity="0.18"/>

  <!-- CONVERGENCE POINT -->
  <circle cx="400" cy="300" r="28" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.20"/>
  <circle cx="400" cy="300" r="18" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.30"/>
  <circle cx="400" cy="300" r="11" fill="#03050C"/>
  <circle cx="400" cy="300" r="9"  fill="#38BDF8" opacity="0.15"/>
  <circle cx="400" cy="300" r="9"  fill="none" stroke="#38BDF8" stroke-width="1.8" opacity="0.85"/>
  <circle cx="400" cy="300" r="4.5" fill="#38BDF8" opacity="0.95"/>
  <circle cx="398" cy="298" r="1.8" fill="#FFFFFF" opacity="0.90"/>

  <!-- FAMILY DOT -->
  <circle cx="400" cy="572" r="4.5" fill="#38BDF8" opacity="0.60"/>

  <!-- RULE -->
  <line x1="260" y1="620" x2="540" y2="620" stroke="#38BDF8" stroke-width="0.5" opacity="0.18"/>

  <!-- WORDMARK -->
  <text x="400" y="680"
    text-anchor="middle"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="74" font-weight="900" letter-spacing="-2.5"
    fill="url(#wordGradd)">MOXSUITE</text>

  <!-- TAGLINE -->
  <text x="400" y="722"
    text-anchor="middle"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="11" font-weight="400" letter-spacing="7"
    fill="#EEF2FF" opacity="0.26">THE ENTERPRISE OPERATING SYSTEM</text>

  <!-- FOUNDING DOTS -->
  <circle cx="376" cy="754" r="3" fill="#7F77DD" opacity="0.55"/>
  <circle cx="400" cy="754" r="3" fill="#38BDF8" opacity="0.55"/>
  <circle cx="424" cy="754" r="3" fill="#D4537E" opacity="0.55"/>

</svg>
