<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
<defs>
  <!-- The three brand colours as gradients for facets -->
  <linearGradient id="gCyan" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38BDF8" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.6"/>
  </linearGradient>
  <linearGradient id="gViolet" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#818CF8" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#6366F1" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="gRose" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#D4537E" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#F472B6" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="gWhite" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
  </linearGradient>
  <!-- Outer ring gradient: rotates around -->
  <linearGradient id="gOuter" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38BDF8"/>
    <stop offset="33%" stop-color="#818CF8"/>
    <stop offset="66%" stop-color="#D4537E"/>
    <stop offset="100%" stop-color="#38BDF8"/>
  </linearGradient>
  <!-- Core glow -->
  <radialGradient id="gCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
  </radialGradient>
  <!-- Background -->
  <radialGradient id="gBg" cx="50%" cy="46%" r="42%">
    <stop offset="0%" stop-color="#0D1830"/>
    <stop offset="100%" stop-color="#06091A"/>
  </radialGradient>
  <!-- Drop shadow filter -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="800" height="900" fill="url(#gBg)"/>

<!-- Subtle radial grid lines for depth -->
<g opacity="0.04" stroke="#38BDF8" stroke-width="0.5" fill="none">
  <circle cx="400" cy="416" r="80"/>
  <circle cx="400" cy="416" r="140"/>
  <circle cx="400" cy="416" r="200"/>
  <circle cx="400" cy="416" r="268"/>
  <line x1="400" y1="148" x2="400" y2="684"/>
  <line x1="132" y1="416" x2="668" y2="416"/>
  <line x1="211" y1="227" x2="589" y2="605"/>
  <line x1="589" y1="227" x2="211" y2="605"/>
</g>

<!-- ═══════════════════════════════════════════
     THE NEXUS MARK — centred at (400, 416)
     Canvas 500x500, translated +150,+166
     
     GEOMETRY:
     Outer diamond: (400,218)(598,416)(400,614)(202,416)
     Mid ring 8pts: 
       (537,359)(537,473)(473,537)(327,537)(263,473)(263,359)(327,295)(473,295)
     Inner octagon 8pts:
       (481,382)(481,450)(434,497)(366,497)(319,450)(319,382)(366,335)(434,335)
     Core diamond: (400,384)(432,416)(400,448)(368,416)
     Dot: (400,577)
     All = original calc + (150,166)
═══════════════════════════════════════════ -->

<!-- === OUTER GLOW PULSE (soft, behind everything) === -->
<g opacity="0.22" filter="url(#softglow)">
  <polygon points="400,218 598,416 400,614 202,416" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
</g>

<!-- === MID STRUCTURAL DIAMOND RING === -->
<!-- Thin outer diamond — the outer "girdle" of the gem -->
<polygon 
  points="400,218 598,416 400,614 202,416" 
  fill="none" 
  stroke="url(#gOuter)" 
  stroke-width="1.2"
  opacity="0.55"
  filter="url(#glow)"
/>

<!-- === 8 CRYSTAL FACETS — the gem cut faces === -->
<!-- Each facet is a thin-stroke triangle from outer diamond point to inner octagon edge -->
<!-- These create the "cut glass" refraction effect -->

<!-- TOP FACET group (cyan zone) -->
<!-- Left top facet: outer-top → inner-left-top → inner-right-top -->
<polygon points="400,218 366,335 434,335" 
  fill="url(#gWhite)" stroke="#38BDF8" stroke-width="0.8" stroke-linejoin="round" opacity="0.7"/>

<!-- RIGHT FACET group (violet zone) -->  
<polygon points="598,416 481,382 481,450" 
  fill="url(#gWhite)" stroke="#818CF8" stroke-width="0.8" stroke-linejoin="round" opacity="0.6"/>

<!-- BOTTOM FACET group (rose zone) -->
<polygon points="400,614 434,497 366,497" 
  fill="url(#gWhite)" stroke="#D4537E" stroke-width="0.8" stroke-linejoin="round" opacity="0.6"/>

<!-- LEFT FACET group (cyan zone, mirrors right) -->
<polygon points="202,416 319,450 319,382" 
  fill="url(#gWhite)" stroke="#38BDF8" stroke-width="0.8" stroke-linejoin="round" opacity="0.65"/>

<!-- DIAGONAL FACETS (mid-zone, more subtle) -->
<!-- Top-right diagonal kite: outer-top → outer-right → inner corner -->
<polygon points="400,218 598,416 481,382 434,335" 
  fill="none" stroke="#818CF8" stroke-width="0.6" stroke-linejoin="round" opacity="0.30"/>
<!-- Bottom-right -->
<polygon points="598,416 400,614 434,497 481,450" 
  fill="none" stroke="#D4537E" stroke-width="0.6" stroke-linejoin="round" opacity="0.25"/>
<!-- Bottom-left -->
<polygon points="400,614 202,416 319,450 366,497" 
  fill="none" stroke="#D4537E" stroke-width="0.6" stroke-linejoin="round" opacity="0.25"/>
<!-- Top-left -->
<polygon points="202,416 400,218 366,335 319,382" 
  fill="none" stroke="#38BDF8" stroke-width="0.6" stroke-linejoin="round" opacity="0.30"/>

<!-- === INNER OCTAGON — the gem "table" === -->
<polygon 
  points="481,382 481,450 434,497 366,497 319,450 319,382 366,335 434,335"
  fill="rgba(56,189,248,0.04)"
  stroke="#38BDF8" 
  stroke-width="1.0"
  opacity="0.55"
/>

<!-- Inner octagon facet lines to core — creates radiant star pattern -->
<g stroke="#FFFFFF" stroke-width="0.5" opacity="0.14" stroke-linecap="round">
  <line x1="481" y1="382" x2="400" y2="416"/>
  <line x1="481" y1="450" x2="400" y2="416"/>
  <line x1="434" y1="497" x2="400" y2="416"/>
  <line x1="366" y1="497" x2="400" y2="416"/>
  <line x1="319" y1="450" x2="400" y2="416"/>
  <line x1="319" y1="382" x2="400" y2="416"/>
  <line x1="366" y1="335" x2="400" y2="416"/>
  <line x1="434" y1="335" x2="400" y2="416"/>
</g>

<!-- === CORE GLOW — centre radiance === -->
<circle cx="400" cy="416" r="52" fill="url(#gCore)" opacity="0.8"/>

<!-- === CORE DIAMOND — the beating heart === -->
<!-- Outer core ring (stroke only) -->
<polygon points="400,374 442,416 400,458 358,416"
  fill="rgba(56,189,248,0.06)"
  stroke="url(#gOuter)"
  stroke-width="1.5"
  stroke-linejoin="round"
  filter="url(#glow)"
  opacity="0.9"
/>

<!-- Inner core fill — bright centre -->
<polygon points="400,390 426,416 400,442 374,416"
  fill="rgba(56,189,248,0.22)"
  stroke="#38BDF8"
  stroke-width="1.2"
  stroke-linejoin="round"
  opacity="0.85"
/>

<!-- Core centre dot — pure light -->
<circle cx="400" cy="416" r="5" fill="#38BDF8" opacity="0.9" filter="url(#glow)"/>
<circle cx="400" cy="416" r="2.5" fill="#FFFFFF" opacity="0.95"/>

<!-- === FAMILY DOT === -->
<!-- Consistent with all 35 product logos — the Mox dot language -->
<circle cx="400" cy="596" r="6.5" fill="#38BDF8" opacity="0.75"/>

<!-- === FOUR SIGNAL RAYS — the "transmission" metaphor === -->
<!-- Ultra-thin, extending from outer diamond points outward -->
<!-- Top ray -->
<line x1="400" y1="218" x2="400" y2="160" stroke="#38BDF8" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
<line x1="400" y1="160" x2="400" y2="148" stroke="#38BDF8" stroke-width="0.5" stroke-linecap="round" opacity="0.18"/>
<!-- Right ray -->
<line x1="598" y1="416" x2="656" y2="416" stroke="#818CF8" stroke-width="1" stroke-linecap="round" opacity="0.30"/>
<line x1="656" y1="416" x2="670" y2="416" stroke="#818CF8" stroke-width="0.5" stroke-linecap="round" opacity="0.15"/>
<!-- Bottom ray -->
<line x1="400" y1="614" x2="400" y2="662" stroke="#D4537E" stroke-width="1" stroke-linecap="round" opacity="0.28"/>
<!-- Left ray -->
<line x1="202" y1="416" x2="144" y2="416" stroke="#38BDF8" stroke-width="1" stroke-linecap="round" opacity="0.30"/>

<!-- ═══════════════════════════════════
     WORDMARK
═══════════════════════════════════ -->
<text 
  x="400" y="720"
  text-anchor="middle"
  font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
  font-size="72"
  font-weight="900"
  letter-spacing="-2"
  fill="#EEF2FF"
>MOX<tspan fill="#38BDF8">SUITE</tspan></text>

<!-- TAGLINE -->
<text 
  x="400" y="766"
  text-anchor="middle"
  font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
  font-size="14"
  font-weight="400"
  letter-spacing="6"
  fill="#EEF2FF"
  opacity="0.32"
>THE ENTERPRISE OPERATING SYSTEM</text>

<!-- Three product dots under tagline — nods to the founding trio -->
<circle cx="370" cy="798" r="3" fill="#7F77DD" opacity="0.55"/>
<circle cx="400" cy="798" r="3" fill="#38BDF8" opacity="0.55"/>
<circle cx="430" cy="798" r="3" fill="#D4537E" opacity="0.55"/>

</svg>
